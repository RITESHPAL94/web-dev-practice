<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video, Audio and Media in HTML</title>
</head>

<body>
    <video src="videoplayback.mp4" controls loop poster="Screenshot 2026-07-08 202344.png"></video>
    <iframe src="https://en.wikipedia.org/wiki/Cristiano_Ronaldo" width="255" height="355"></iframe>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/IRCaZT6hDa8?si=-OuUnqRmTg-MP5px"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>"
</body>

</html>
