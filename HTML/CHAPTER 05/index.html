<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form let's learn it. </title>
</head>

<body>
    <h1>Form to apply for Goat debate. </h1>
    <form action="post">
        <div>
            <label for="username">Enter your username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">subscribe to newletter</label>
        </div>
        <div>
            <label for="comment">Enter your comment</label>
            <br>
            <textarea name="comment" rows="4" cols="50"></textarea>
        </div>
        <div>
            <select name="GOAT">
                <option value="messi">Lionel MESSI</option>
                <option value="ronaldo">Cristano Ronaldo</option>
                <option value="neymar">Neymar Jr. Santos</option>
            </select>
        </div>
    </form>
</body>

</html>
