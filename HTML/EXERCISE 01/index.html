<!-- QUESTION 1:
YOU ARE GIVEN 12 FILES, 6 AUDIO AND 6 VIDEO.
DESIGN A WEBSITE USING HTML ONLY WHICH SHOWS THESE 12 FILES.
1.mp3, 2.mp3 .... 6.mp3
videoplayback.mp4, 2.mp4 .... 6.mp4 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 01</title>
</head>
<body>
    <nav>
        <header>
            <video src="videoplayback.mp4" controls loop muted></video>
            <video src="2.mp3" controls  loop></video>
            <video src="3.mp3" controls loop></video>
            <video src="4.mp3" controls loop></video>
            <video src="5.mp3" controls loop></video>
            <video src="6.mp3" controls loop></video>

            <audio src="1.mp3" controls loop></audio>
            <audio src="2.mp3" controls loop></audio>
            <audio src="3.mp3" controls loop></audio>
            <audio src="4.mp3" controls loop></audio>
            <audio src="5.mp3" controls loop></audio>
            <audio src="6.mp3" controls loop></audio>
        </header>
    </nav>
</body>
</html>
